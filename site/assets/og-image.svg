<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00d4aa" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Accent glow -->
  <ellipse cx="600" cy="280" rx="300" ry="150" fill="#00d4aa" opacity="0.04"/>
  <!-- Monitor icon -->
  <rect x="540" y="120" width="120" height="90" rx="8" fill="none" stroke="#00d4aa" stroke-width="4"/>
  <rect x="555" y="135" width="90" height="60" rx="3" fill="#00d4aa" opacity="0.12"/>
  <rect x="585" y="210" width="30" height="15" rx="2" fill="#00d4aa" opacity="0.3"/>
  <rect x="565" y="225" width="70" height="6" rx="3" fill="#00d4aa" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="Segoe UI Variable, system-ui, sans-serif" font-weight="800" font-size="72" fill="#e8e8ed">Fresh<tspan fill="#00d4aa">Rig</tspan></text>
  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Segoe UI Variable, system-ui, sans-serif" font-weight="400" font-size="24" fill="#9898a8">The first tool you run after a fresh Windows install</text>
  <!-- Feature pills -->
  <rect x="240" y="420" width="200" height="36" rx="18" fill="#00d4aa" opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="340" y="443" text-anchor="middle" font-family="Segoe UI Variable, system-ui, sans-serif" font-size="14" fill="#00d4aa">Hardware Detection</text>
  <rect x="470" y="420" width="200" height="36" rx="18" fill="#00d4aa" opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="570" y="443" text-anchor="middle" font-family="Segoe UI Variable, system-ui, sans-serif" font-size="14" fill="#00d4aa">Driver Finder</text>
  <rect x="700" y="420" width="200" height="36" rx="18" fill="#00d4aa" opacity="0.1" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="800" y="443" text-anchor="middle" font-family="Segoe UI Variable, system-ui, sans-serif" font-size="14" fill="#00d4aa">Batch App Install</text>
  <!-- Footer -->
  <text x="600" y="550" text-anchor="middle" font-family="Segoe UI Variable, system-ui, sans-serif" font-size="16" fill="#5a5a6e">Free &amp; Open Source | Built with Rust &amp; Tauri</text>
</svg>
